name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release
        run: |
          xcodebuild -scheme mrkd -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent mrkd.app mrkd.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/mrkd.zip
          generate_release_notes: true
